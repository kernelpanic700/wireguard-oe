name: Build Linux Server

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.20'
      - name: Build server
        run: |
          cd server/userspace
          go build -o ../../bin/wireguard-oe-server .
      - name: Run tests
        run: |
          cd common
          go test -v ./...
